spring:
  application:
    name: spring-ai-knowledge-base
  
  ai: 
    ollama:
      base-url: http://host.docker.internal:11434 # Kết nối đến Ollama trên host qua Docker Bridge
      chat:
        options:
          model: qwen2.5:7b
      embedding:
        options:
          model: nomic-embed-text
          
    vectorstore:
      opensearch:
        uris: http://opensearch:9200
        index-name: ai-knowledge-base
        initialize-schema: true # Tự động tạo index và mapping k-NN nếu chưa có

    # MCP Client - Kết nối đến Standalone OpenSearch MCP Server
    mcp:
      client:
        sse:
          connections:
            opensearch-mcp:
              url: http://opensearch-mcp:9900

server:
  port: 8080

logging:
  level:
    org.springframework.ai: DEBUG
