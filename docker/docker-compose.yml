version: '3.8'

services:
  opensearch:
    image: opensearchproject/opensearch:latest          # tự động arm64 trên Apple Silicon
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true                 # tắt security cho local demo
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g                   # Tăng RAM cho Vector Search
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=MyComplexPassword123!@#
      - knn.algo_param.index_thread_qty=2                   # Tối ưu cho việc tạo index vector
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_healthy

  logstash:
    image: opensearchproject/logstash-oss-with-opensearch-output-plugin:latest
    container_name: logstash
    volumes:
      - ./logstash/pipeline.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9600 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  opensearch-mcp:
    build: ./mcp-server
    container_name: opensearch-mcp
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=admin
    ports:
      - "9900:9900"
    depends_on:
      opensearch:
        condition: service_healthy

  spring-boot-app:
    build: ../spring-boot-app
    container_name: spring-boot-app
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      opensearch:
        condition: service_healthy
      logstash:
        condition: service_healthy
      opensearch-mcp:
        condition: service_started

volumes:
  opensearch_data:
